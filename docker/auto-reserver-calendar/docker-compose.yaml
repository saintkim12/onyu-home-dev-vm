# version: '3.8'

services:
  auto-reserver-calendar:
    image: ghcr.io/saintkim12/auto-reserver-calendar:latest
    container_name: auto-reserver-calendar
    ports:
      - '${AUTO_RESERVER_CALENDAR_PORT:-3000}:3000'
    restart: unless-stopped
    environment:
      # Node.js 환경 변수
      - NODE_ENV=production
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Seoul
    networks:
      - app-network
    env_file: ../../stack.env
    # # 리소스 제한 설정
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #       cpus: '0.5'
    #     reservations:
    #       memory: 256M
    #       cpus: '0.25'

networks:
  app-network:
    driver: bridge
